<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site_name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .card-header {
      background: #1c2128;
      border-bottom: 1px solid #30363d;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 8px #3fb950aa;
      flex-shrink: 0;
    }

    .card-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: -0.01em;
    }

    .card-header .label {
      margin-left: auto;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #3fb950;
      background: #1a3a20;
      border: 1px solid #2ea043;
      border-radius: 20px;
      padding: 2px 10px;
    }

    .card-body {
      padding: 0.5rem 0;
    }

    .row {
      display: flex;
      align-items: center;
      padding: 0.85rem 2rem;
      border-bottom: 1px solid #21262d;
      gap: 1rem;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #21262d;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .row-icon svg {
      width: 16px;
      height: 16px;
      stroke: #8b949e;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .row-label {
      font-size: 0.78rem;
      color: #8b949e;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 120px;
    }

    .row-value {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.9rem;
      color: #cdd9e5;
      margin-left: auto;
      text-align: right;
    }

    .card-footer {
      background: #1c2128;
      border-top: 1px solid #30363d;
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-footer span {
      font-size: 0.72rem;
      color: #6e7681;
    }

    .card-footer .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #6e7681;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="card-header">
      <div class="status-dot"></div>
      <h1>{{ site_name }}</h1>
      <span class="label">Online</span>
    </div>

    <div class="card-body">

      <div class="row">
        <div class="row-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        </div>
        <span class="row-label">Hostname</span>
        <span class="row-value">{{ ansible_hostname }}</span>
      </div>

      <div class="row">
        <div class="row-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <span class="row-label">Dirección IP</span>
        <span class="row-value">{{ ansible_default_ipv4.address }}</span>
      </div>

      <div class="row">
        <div class="row-icon">
          <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </div>
        <span class="row-label">Sistema Op.</span>
        <span class="row-value">{{ ansible_distribution }}</span>
      </div>

    </div>

    <div class="card-footer">
      <span>Generado por Ansible</span>
      <div class="dot"></div>
      <span>{{ ansible_date_time.date | default('') }}</span>
    </div>

  </div>

</body>
</html>
